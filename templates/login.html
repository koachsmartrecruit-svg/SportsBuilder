{% extends "base.html" %}
{% block title %}Login — SportsBuilder{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">⚡</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your SportsBuilder account</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
        <small style="float: right; margin-top: 0.25rem;"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></small>
      </div>
      <div class="form-check">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn-primary btn-full">Sign In</button>
    </form>

    <p class="auth-footer">No account? <a href="{{ url_for('signup') }}">Create one free →</a></p>
  </div>
</div>
{% endblock %}
