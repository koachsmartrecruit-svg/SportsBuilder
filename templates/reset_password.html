{% extends "base.html" %}
{% block title %}Reset Password — SportsBuilder{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🔑 Reset Password</h1>
      <p>Enter your new password</p>
    </div>

    <form method="POST" class="auth-form">
      <input type="hidden" name="token" value="{{ token }}">
      
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" required autofocus minlength="8" placeholder="At least 8 characters">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Re-enter password">
      </div>

      <button type="submit" class="btn-primary btn-block">Reset Password</button>
    </form>

    <div class="auth-footer">
      <p><a href="{{ url_for('login') }}">Back to Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
