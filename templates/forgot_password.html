{% extends "base.html" %}
{% block title %}Forgot Password — SportsBuilder{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🔒 Forgot Password</h1>
      <p>Enter your email to receive reset instructions</p>
    </div>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required autofocus placeholder="your@email.com">
      </div>

      <button type="submit" class="btn-primary btn-block">Send Reset Link</button>
    </form>

    <div class="auth-footer">
      <p>Remember your password? <a href="{{ url_for('login') }}">Login</a></p>
      <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    </div>
  </div>
</div>
{% endblock %}
