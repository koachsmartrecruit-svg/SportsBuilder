services:
  - type: web
    name: sportsbuilder
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sportsbuilder-db
          property: connectionString
    autoDeploy: true

databases:
  - name: sportsbuilder-db
    databaseName: sportsbuilder
    user: sportsbuilder
